<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brand Store</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&family=Cairo:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@2.5.0/fonts/remixicon.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="header" id="header">
      <nav class="nav container">
        <a href="index.html" class="nav__logo">
          Brand<span class="dot">.</span>
        </a>

        <div class="nav__menu" id="nav-menu">
          <ul class="nav__list">
            <li class="nav__item active-link">
              <a href="index.html" class="nav__link" data-key="nav_home"
                >Home</a
              >
            </li>
            <li class="nav__item">
              <a
                href="./products.html"
                class="nav__link"
                data-key="nav_products"
                >Products</a
              >
            </li>
            <li class="nav__item">
              <a href="#new" class="nav__link" data-key="nav_new">New</a>
            </li>
          </ul>
          <div class="nav__close" id="nav-close">
            <i class="ri-close-line"></i>
          </div>
        </div>

        <div class="nav__btns">
          <button class="nav__lang" id="lang-button">EG</button>

          <i class="ri-moon-line change-theme" id="theme-button"></i>

          <div class="nav__shop">
            <i class="ri-shopping-bag-line"></i>
            <span class="cart-count">0</span>
          </div>

          <div class="nav__toggle" id="nav-toggle">
            <i class="ri-menu-line"></i>
          </div>
        </div>
      </nav>
    </header>

    <main class="main">
      <section class="detail section container">
        <div class="detail__container grid">
          <div class="detail__images">
            <div class="detail__main-img">
              <i class="ri-image-line"></i>
            </div>
            <div class="detail__thumb-imgs grid">
              <div class="detail__thumb-img"><i class="ri-image-line"></i></div>
              <div class="detail__thumb-img"><i class="ri-image-line"></i></div>
              <div class="detail__thumb-img"><i class="ri-image-line"></i></div>
            </div>
          </div>

          <div class="detail__data">
            <span
              class="detail__category"
              id="detail-category"
              data-key="product_category_apparel"
              >Apparel</span
            >
            <h1 class="detail__title" id="detail-title">Urban Hoodie</h1>
            <span class="detail__price" id="detail-price">$59.00</span>
            <p class="detail__description" id="detail-description">
              [Product Description Loaded by JS]
            </p>

            <div class="detail__options">
              <h3 class="detail__subtitle" data-key="product_details_size">
                Size
              </h3>
              <div class="detail__sizes" id="detail-sizes"></div>

              <h3 class="detail__subtitle" data-key="product_details_color">
                Color
              </h3>
              <div class="detail__colors" id="detail-colors"></div>
            </div>

            <button
              class="button detail__button"
              data-key="product_details_add_cart"
              onclick="addToCart(document.getElementById('detail-title').textContent)"
            >
              <i class="ri-shopping-bag-line"></i> Add to Cart
            </button>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer section">
      <div class="footer__container container grid">
        <div class="footer__content">
          <h3 class="footer__title" data-key="brand_name">Brand</h3>
          <p class="footer__description" data-key="footer_desc">
            Boldly minimal. <br />
            Crafted for the future.
          </p>
        </div>

        <div class="footer__content">
          <h3 class="footer__title" data-key="footer_links">Links</h3>
          <ul class="footer__links">
            <li>
              <a href="#" class="footer__link" data-key="footer_about">About</a>
            </li>
            <li>
              <a href="#" class="footer__link" data-key="footer_support"
                >Support</a
              >
            </li>
            <li>
              <a href="#" class="footer__link" data-key="footer_contact"
                >Contact</a
              >
            </li>
          </ul>
        </div>

        <div class="footer__content">
          <div class="footer__social">
            <a href="#" class="footer__social-link"
              ><i class="ri-facebook-fill"></i
            ></a>
            <a href="#" class="footer__social-link"
              ><i class="ri-instagram-line"></i
            ></a>
            <a href="#" class="footer__social-link"
              ><i class="ri-twitter-fill"></i
            ></a>
          </div>
        </div>
      </div>
      <p class="footer__copy" data-key="footer_copy">
        &#169; 2024 Lumina Design. All rights reserved.
      </p>
    </footer>

    <div id="toast" class="toast" data-key="toast_added_cart">
      Added to Cart
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
