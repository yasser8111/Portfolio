<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brand Store</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&family=Cairo:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@2.5.0/fonts/remixicon.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="header" id="header">
      <nav class="nav container">
        <a href="index.html" class="nav__logo">
          Brand<span class="dot">.</span>
        </a>

        <div class="nav__menu" id="nav-menu">
          <ul class="nav__list">
            <li class="nav__item">
              <a
                href="index.html"
                class="nav__link active-link"
                data-key="nav_home"
                >Home</a
              >
            </li>
            <li class="nav__item">
              <a
                href="./products.html"
                class="nav__link"
                data-key="nav_products"
                >Products</a
              >
            </li>
            <li class="nav__item">
              <a href="#new" class="nav__link" data-key="nav_new">New</a>
            </li>
          </ul>
          <div class="nav__close" id="nav-close">
            <i class="ri-close-line"></i>
          </div>
        </div>

        <div class="nav__btns">
          <button class="nav__lang" id="lang-button">EG</button>

          <i class="ri-moon-line change-theme" id="theme-button"></i>

          <div class="nav__shop">
            <i class="ri-shopping-bag-line"></i>
            <span class="cart-count">0</span>
          </div>

          <div class="nav__toggle" id="nav-toggle">
            <i class="ri-menu-line"></i>
          </div>
        </div>
      </nav>
    </header>

    <main class="main">
      <section class="products section container" id="products">
        <div class="section__header">
          <h2 class="section__subtitle" data-key="all_products_subtitle">
            All Products
          </h2>
          <div class="section__link">
            <a href="./index.html" data-key="back_link">Back </a>
            <i class="ri-arrow-right-line section__icon"></i>
          </div>
        </div>
        <div class="products__container grid" id="products-grid-full"></div>
      </section>
    </main>

    <footer class="footer section">
      <div class="footer__container container grid">
        <a href="#" class="scrollup" id="scroll-up">
          <i class="ri-arrow-up-s-line"></i>
        </a>
        <div class="footer__content">
          <h3 class="footer__title" data-key="brand_name">Brand</h3>
          <p class="footer__description" data-key="footer_desc">
            Boldly minimal. <br />
            Crafted for the future.
          </p>
        </div>

        <div class="footer__content">
          <h3 class="footer__title" data-key="footer_links">Links</h3>
          <ul class="footer__links">
            <li>
              <a href="#" class="footer__link" data-key="footer_about">About</a>
            </li>
            <li>
              <a href="#" class="footer__link" data-key="footer_support"
                >Support</a
              >
            </li>
            <li>
              <a href="#" class="footer__link" data-key="footer_contact"
                >Contact</a
              >
            </li>
          </ul>
        </div>

        <div class="footer__content">
          <h3 class="footer__title" data-key="footer_contact">contact</h3>
          <div class="footer__social">
            <a href="#" class="footer__social-link"
              ><i class="ri-facebook-fill"></i
            ></a>
            <a href="#" class="footer__social-link"
              ><i class="ri-instagram-line"></i
            ></a>
            <a href="#" class="footer__social-link"
              ><i class="ri-twitter-fill"></i
            ></a>
          </div>
        </div>
      </div>
      <p class="footer__copy" data-key="footer_copy">
        &#169; 2024 Lumina Design. All rights reserved.
      </p>
    </footer>

    <div id="toast" class="toast">Added to Cart</div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
